[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[context.production.environment]
  GEMINI_API_KEY = "your-gemini-api-key"
  JWT_SECRET = "your-jwt-secret"

[context.development.environment]
  GEMINI_API_KEY = "your-gemini-api-key"
  JWT_SECRET = "your-jwt-secret"
